    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  - name: opportunity-sizer
    file: agents/opportunity-sizer.md
    pipeline_step: 8
    critical: false
    depends_on:
      - validation
    inputs:
      - OPPORTUNITY
      - ANALYSIS_RESULTS
      - DATASET
      - ASSUMPTIONS
      - VALUE_METRICS
    outputs:
