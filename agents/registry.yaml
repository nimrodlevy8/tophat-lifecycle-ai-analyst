# registry.yaml — Machine-readable agent index
# Auto-generated from CONTRACT blocks. Source of truth for OR-3 DAG walker.
# Do NOT edit by hand — regenerate from agent CONTRACT blocks.
#
# Validation rules (enforced at pre-flight):
#   1. Every agent.file must exist on disk
#   2. Every name in depends_on must reference an agent in this file
#   3. No cycles in the dependency graph (topological sort must succeed)
#   4. Every pipeline_step agent must be reachable from at least one root (no orphans)
#   5. Standalone agents (pipeline_step: null) are excluded from pipeline DAG
#   6. critical defaults to true if omitted. Non-critical agents (critical: false)
#      use warn_on_failure degradation — pipeline continues on failure with a warning.
#   7. depends_on_any (optional): OR-dependency list. At least one named agent
#      must complete before this agent runs. Contrast with depends_on (AND — all
#      must complete). If both are present, all AND deps + at least one OR dep
#      must be satisfied.

version: 1
agents:
  # ── Phase 1: Framing ──────────────────────────────────────────────

  - name: question-framing
    file: agents/question-framing.md
    pipeline_step: 1
    critical: true
    depends_on: []
    inputs:
      - BUSINESS_CONTEXT
      - PRODUCT_DESCRIPTION
      - AVAILABLE_DATA
    outputs:
      - outputs/question_brief_{{DATE}}.md
    knowledge_context: []

  # ── Phase 2: Hypotheses ───────────────────────────────────────────
  # NOTE: hypothesis has no downstream DAG edges — its output is injected
  # as runtime context (HYPOTHESIS_DOC) into descriptive-analytics et al.
  # This is intentional: hypothesis is advisory, not blocking for analysis.

  - name: hypothesis
    file: agents/hypothesis.md
    pipeline_step: 3
    critical: true
    depends_on:
      - question-framing
    inputs:
      - QUESTION_BRIEF
      - DATA_INVENTORY
    outputs:
      - outputs/hypothesis_doc_{{DATE}}.md
    knowledge_context: []

  # ── Phase 3: Data Discovery & Verification ────────────────────────

  - name: data-explorer
    file: agents/data-explorer.md
    pipeline_step: 4
    critical: true
    depends_on: []
    inputs:
      - DATA_SOURCE
      - ANALYSIS_GOALS
    outputs:
      - outputs/data_inventory_{{DATE}}.md
      - working/data_inventory_raw.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  # DEPRECATED: source-tieout is replaced by cross-verification (step 6.5).
  # The data-explorer sanity gate (step 2.5) handles pre-analysis checks.
  # This entry is kept for backward compatibility with existing pipeline states.
  # The agent file has been deleted; this entry exists only for state migration.
  - name: source-tieout
    file: agents/cross-verification.md  # redirected — original file deleted
    pipeline_step: null
    critical: false
    depends_on:
      - data-explorer
    inputs:
      - DATA_SOURCE
      - DUCKDB_PATH
      - DATASET_NAME
      - TABLE_MAPPING
    outputs:
      - working/tieout_{{DATASET_NAME}}_{{DATE}}.md
      - working/tieout_mapping.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  # ── Phase 3b: Cross-Verification ──────────────────────────────────
  # Replaces the old source-tieout dual-path paradigm with same-source,
  # different-calculation-path verification. Runs after analysis, before
  # storytelling. Uses the query log and analysis findings.

  - name: cross-verification
    file: agents/cross-verification.md
    pipeline_step: 6.5
    critical: true
    depends_on:
      - root-cause-investigator
    depends_on_any:
      - descriptive-analytics
      - overtime-trend
      - cohort-analysis
    inputs:
      - ANALYSIS_RESULTS
      - QUERY_LOG
      - DATASET_NAME
      - CONNECTION_TYPE
    outputs:
      - working/cross_verification_{{DATASET_NAME}}_{{DATE}}.md
      - working/provenance_{{DATASET_NAME}}_{{DATE}}.yaml
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  # ── Phase 4: Analysis ─────────────────────────────────────────────

  - name: descriptive-analytics
    file: agents/descriptive-analytics.md
    pipeline_step: 5
    critical: true
    depends_on:
      - data-explorer
    inputs:
      - DATASET
      - QUESTION_BRIEF
      - HYPOTHESIS_DOC
      - DATA_INVENTORY
      - FOCUS_AREA
    outputs:
      - outputs/analysis_report_{{DATE}}.md
      - outputs/charts/*.png
      - working/data_readiness_check.md
    knowledge_context:
      - .knowledge/datasets/{active}/schema.md
      - .knowledge/datasets/{active}/quirks.md

  - name: overtime-trend
    file: agents/overtime-trend.md
    pipeline_step: 5
