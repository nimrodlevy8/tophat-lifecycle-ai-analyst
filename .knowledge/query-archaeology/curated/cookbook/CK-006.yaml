id: CK-006
title: Post-Event Cohort Retention Analysis
description: |
  Pattern for measuring player retention and revenue after a minigame event ends.
  Joins back to v_f_user_standard_kpis with a ±30-day window around the user's
  last active day in the event. Produces cohort_day (days since event end) as
  a dimension, enabling retention curves by event and segment.
sql: |
  -- In the inner subquery, capture last_day_active:
  -- MAX(t1.snapshot_date) AS last_day_active

  -- Then join for the cohort window:
  LEFT JOIN `dwh-prod-tophat.BIZ.v_f_user_standard_kpis` f
    ON a.user_id = f.user_id
    AND f.snapshot_date BETWEEN a.last_day_active - 30 AND a.last_day_active + 30

  -- Cohort day dimension:
  DATE_DIFF(f.snapshot_date, a.last_day_active, DAY) AS cohort_day

  -- Key cohort metrics:
  COUNT(DISTINCT CASE WHEN f.v_f_user_rpt.is_active
        AND COALESCE(a.currency_sink, 0) <> 0
        THEN f.user_id END) AS cohort_returned_players,
  SUM(CASE WHEN f.v_f_user_rpt.is_active
      AND COALESCE(a.currency_sink, 0) <> 0
      THEN f.v_f_user_rpt.f_iap_revenue END) AS cohort_revenue,
  COUNT(DISTINCT CASE WHEN f.v_f_user_rpt.is_active
        AND f.v_f_user_rpt.f_last_7d_active_days > f.v_f_user_rpt.f_next_7d_active_days
        THEN a.user_id END) AS cohort_lapsed_players
dataset: mgo
tables:
  - DM.fac_intraday_minigame_snapshot_daily
  - BIZ.v_f_user_standard_kpis
tags: [cohort, retention, post-event, lapse, revenue-impact]
