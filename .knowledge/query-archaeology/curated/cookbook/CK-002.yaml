id: CK-002
title: Liveops ID Cleaning Pattern
description: |
  Liveops IDs for seasonal/special events contain '@' and encoded suffixes that make
  them hard to read and group. This pattern extracts a human-readable cleaned version
  by combining the start date with the parsed event name suffix.
sql: |
  -- Cleaning pattern for liveops_id:
  -- Raw: 'CoopAquaPartners2024@07082025_SE_Coop_AquaPartners2025'
  -- Cleaned: '2025-07-08_Coop_AquaPartners2025'
  CASE WHEN liveops_id LIKE '%@%'
    THEN CONCAT(
      DATE(liveops_start_time),
      REPLACE(
        RIGHT(
          SPLIT(liveops_id, '@')[1],
          LENGTH(SPLIT(liveops_id, '@')[1]) - LENGTH(SPLIT(SPLIT(liveops_id, '@')[1], '_')[0])
        ),
        'SE_', ''
      )
    )
    ELSE liveops_id
  END AS liveops_id_cleaned
dataset: mgo
tables:
  - DM.fac_intraday_minigame_snapshot_daily
  - BIZ.dim_intraday_live_minigames
tags: [liveops, id-cleaning, string-parsing, utility]
