table_name: fac_intraday_tycoon_race_team_stage_progression
dataset: mgo
schema: dwh-prod-tophat.DM
grain: team_id × competition_id × liveops_id × race_stage (one row per team per stage per competition)
primary_key: [team_id, competition_id, liveops_id, race_stage]

columns_observed:
  - team_id                                 # unique team identifier
  - competition_id                          # bracket/competition instance
  - liveops_id                              # event identifier
  - sk_liveops_event                        # surrogate key for liveops event
  - race_mode                               # 'solo' or 'team'
  - race_stage                              # stage within the race (Race_1, Race_2, Podium, etc.)
  - race_schedule_key                       # schedule configuration key (e.g., RaceSchedule_WWL_d2)
  - team_mmr                                # team's matchmaking rating
  - mmr_segmentation_config_id              # MMR bucket configuration (can be NULL)
  - team_podium_position                    # final placement for this stage (0 = winner)
  # Team-level aggregated metrics
  - f_n_team_users                          # number of players on the team
  - f_n_team_progress_points                # total progress points for the team
  - f_n_team_currency_sink                  # event currency spent by the team
  - f_n_team_revenue                        # IAP revenue from team members (FLOAT64)
  - f_n_team_max_laps_completed             # highest lap count reached
  - f_n_team_progression_transactions       # total progression actions by team
  - f_n_team_progression_transactions_with_boosters   # transactions using boosters
  - f_n_team_progression_transactions_with_rocket     # transactions using rockets
  - f_n_team_progression_transactions_with_turbo      # transactions using turbo boost
  - f_n_team_progression_transactions_with_ballandchain  # transactions using ball-and-chain
  - f_n_team_to_winner_points_percentual_difference   # gap to winner (0.0 = winner)
  # Booster & item metrics
  - f_n_team_lucky_rockets_activated        # rockets activated by team
  - f_n_team_turbo_activated                # turbo boosts activated
  - f_n_team_ball_and_chain_activated       # ball-and-chain items activated
  - f_n_team_ball_and_chain_received        # ball-and-chain items received (from opponents)
  - f_n_team_rockets_deleted                # rockets deleted/wasted
  - f_n_team_rocket_usage_efficiency        # efficiency ratio (FLOAT64)
  - f_n_team_bad_partners                   # count of inactive/low-contribution partners
  # User-level detail (nested)
  - user_metrics                            # REPEATED RECORD — per-user breakdown within the team

nested_fields:
  user_metrics:
    - user_id                               # individual player
    - f_n_user_progress_points              # individual progress points
    - f_n_user_currency_sink                # individual currency spent
    - f_n_user_revenue                      # individual IAP revenue (FLOAT64)
    - f_n_user_progression_transactions     # individual progression actions
    - f_n_user_progression_transactions_with_boosters
    - f_n_user_lucky_rockets_activated
    - f_n_user_lucky_rockets_used
    - f_n_user_lucky_rockets_ignored
    - f_n_user_turbo_activated
    - f_n_user_turbo_used
    - f_n_user_ball_and_chain_activated
    - f_n_user_ball_and_chain_used

common_filters:
  - "race_stage = 'Podium'  -- for final results"
  - "race_mode = 'team'  -- team races only"

gotchas:
  - "user_metrics is a REPEATED RECORD (array) — use UNNEST(user_metrics) to get per-user rows"
  - "f_n_team_bad_partners counts teammates with very low contribution — useful for carry analysis"
  - "team_podium_position is 0-indexed: 0 = 1st place"
  - "revenue fields are FLOAT64, not INT64 — handle precision in aggregations"
  - "race_schedule_key identifies the specific race configuration (timing, rewards, bracket rules)"
  - "Solo races still appear here — one user per 'team' with race_mode = 'solo'"
  - "Booster metrics (rockets, turbo, ball-and-chain) are key to understanding P2W dynamics"

common_joins:
  - target_table: DM.fac_intraday_tycoon_race_competition
    join_key: "competition_id + liveops_id + race_stage"
    cardinality: "N:1"
    notes: "Gets bracket-level summaries (point spreads, winner)"
  - target_table: DM.d_minigame_user_attributes
    join_key: "user_id (from UNNEST) + liveops_id"
    cardinality: "N:1"
    notes: "After UNNEST user_metrics — gets player segmentation"
  - target_table: BIZ.dim_intraday_live_minigames
    join_key: liveops_id
    cardinality: "N:1"
    notes: "Gets event metadata"

updated_at: "2026-04-16"
