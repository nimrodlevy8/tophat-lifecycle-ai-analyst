<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="80" height="40">
  <!-- Monopoly top hat silhouette -->
  <g fill="#3B3447" opacity="0.85">
    <!-- Hat brim -->
    <ellipse cx="28" cy="32" rx="16" ry="4"/>
    <!-- Hat crown -->
    <rect x="18" y="12" width="20" height="20" rx="2"/>
    <!-- Hat top rim -->
    <rect x="16" y="10" width="24" height="4" rx="2"/>
  </g>

  <!-- AI spark/neural node cluster emerging from hat -->
  <g fill="#DBC585">
    <!-- Central spark -->
    <circle cx="42" cy="10" r="2.5"/>
    <!-- Orbiting nodes -->
    <circle cx="48" cy="6" r="1.5"/>
    <circle cx="50" cy="13" r="1.5"/>
    <circle cx="44" cy="4" r="1.2"/>
    <!-- Connecting lines (neural network hint) -->
    <line x1="42" y1="10" x2="48" y2="6" stroke="#DBC585" stroke-width="0.7" opacity="0.7"/>
    <line x1="42" y1="10" x2="50" y2="13" stroke="#DBC585" stroke-width="0.7" opacity="0.7"/>
    <line x1="42" y1="10" x2="44" y2="4" stroke="#DBC585" stroke-width="0.7" opacity="0.7"/>
    <line x1="48" y1="6" x2="44" y2="4" stroke="#DBC585" stroke-width="0.7" opacity="0.5"/>
  </g>

  <!-- "AI" micro text -->
  <text x="56" y="36" font-family="Jost, sans-serif" font-size="9" font-weight="600" fill="#3B3447" opacity="0.7">AI</text>
</svg>
